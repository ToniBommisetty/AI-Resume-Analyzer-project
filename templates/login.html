<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
background:#0b0b0f;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-container{
background:#1a1a1f;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#9333ea;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#7e22ce;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Login to JobAI</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

</div>

</body>
</html>
